<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>My Life Logs</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Zen Kaku Gothic New', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000; /* ロード時のチラつき防止 */
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 玄関の背景画像（お好みの全体風景などに差し替えてください） */
        .portal-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        /* 背景を少し暗く落としてカードを際立たせるフィルター */
        .portal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
            z-index: -1;
        }

        /* ヘッダー部分 */
        header {
            padding: calc(60px + env(safe-area-inset-top)) 20px 40px;
            text-align: center;
        }

        header h1 {
            margin: 0; font-size: 48px; font-weight: 700;
            letter-spacing: 6px; text-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        header p {
            margin: 15px 0 0 0; font-family: 'Cormorant Garamond', serif;
            font-size: 20px; font-style: italic; opacity: 0.8;
            letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        /* カードを並べるグリッドレイアウト */
        .card-container {
            flex: 1;
            display: grid;
            /* 画面幅に合わせてカードの列数を自動調整（レスポンシブ） */
            grid-template-columns: repeat(auto-fit, minmax(280px, 320px));
            gap: 30px;
            padding: 20px;
            justify-content: center;
            align-content: center;
            max-width: 1200px;
            margin: 0 auto 60px;
        }

        /* ぬめっと動くすりガラスカードの魔法 */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            text-decoration: none; /* リンクの下線を消す */
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            /* ★ ここがぬめっとした動きの肝（cubic-bezierで物理的な慣性を表現） */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-card:hover {
            transform: translateY(-12px) scale(1.02); /* ふわっと浮いて少し拡大 */
            background: rgba(255, 255, 255, 0.15); /* 少し明るくなる */
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(255,255,255,0.1); /* 発光するような影 */
        }

        .glass-card:active {
            transform: translateY(0) scale(0.98); /* 押した瞬間に沈み込む */
            transition: all 0.1s;
        }

        /* カード内のアイコンとテキスト */
        .card-icon {
            font-size: 40px;
            margin-bottom: 20px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }

        .card-desc {
            font-size: 13px;
            opacity: 0.7;
            margin: 0;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 36px; }
            .card-container { gap: 20px; grid-template-columns: 1fr; max-width: 360px; }
            .glass-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="portal-bg"></div>
    <div class="portal-overlay"></div>

    <header>
        <h1>vhgkor</h1>
        <p>Exploration & Records</p>
    </header>

    <div class="card-container">
        <a href="coffee.html" class="glass-card">
            <div class="card-icon">☕️</div>
            <h2 class="card-title">珈琲紀行</h2>
            <p class="card-desc">開拓したロースタリーや<br>カフェの記録と評価</p>
        </a>

        <a href="machichuka.html" class="glass-card">
            <div class="card-icon">🍜</div>
            <h2 class="card-title">町中華紀行 Map</h2>
            <p class="card-desc">絶品の炒飯と餃子を求めて<br>街角の老舗を巡る記録</p>
        </a>

        <a href="hiking.html" class="glass-card">
            <div class="card-icon">⛰️</div>
            <h2 class="card-title">登山紀行</h2>
            <p class="card-desc">登頂した山々のルートと<br>絶景撮影スポットの足跡</p>
        </a>
    </div>

</body>
</html>
